<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy do Cassio </title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>

<style>
body {
  margin: 0;
  background: linear-gradient(to bottom, #0f172a, #1e293b);
}
</style>
</head>

<body>

<script>
let player, pipes;
let score = 0;
let best = localStorage.getItem("best") || 0;
let scoreText, bestText, startText;
let gameOver = false;
let started = false;
let speed = -200;
let canJump = true;

// sons
let jumpSound, hitSound, pointSound;

const config = {
    type: Phaser.AUTO,
    width: 400,
    height: 600,
    physics: {
        default: "arcade",
        arcade: { gravity: { y: 500 } }
    },
    scene: {
        preload, create, update
    }
};

const game = new Phaser.Game(config);

function preload() {
    this.load.image("player", "https://labs.phaser.io/assets/sprites/yellow_ball.png");
    this.load.image("pipe", "https://labs.phaser.io/assets/sprites/column.png");

    this.load.audio("jump", "https://labs.phaser.io/assets/audio/SoundEffects/jump.mp3");
    this.load.audio("hit", "https://labs.phaser.io/assets/audio/SoundEffects/explosion.mp3");
    this.load.audio("point", "https://labs.phaser.io/assets/audio/SoundEffects/p-ping.mp3");
}

function create() {
    player = this.physics.add.image(100, 300, "player");
    player.setCollideWorldBounds(true);

    pipes = this.physics.add.group();

    jumpSound = this.sound.add("jump");
    hitSound = this.sound.add("hit");
    pointSound = this.sound.add("point");

    scoreText = this.add.text(20, 20, "Score: 0", { fontSize: "22px", fill: "#fff" });
    bestText = this.add.text(20, 50, "Recorde: " + best, { fontSize: "16px", fill: "#aaa" });

    startText = this.add.text(40, 260, "CLIQUE PARA JOGAR", {
        fontSize: "24px",
        fill: "#fff"
    });

    // INPUT CORRIGIDO (mais confiável)
    this.input.on("pointerdown", () => handleInput(this));
    this.input.keyboard.on("keydown-SPACE", () => handleInput(this));
}

function handleInput(scene) {
    // libera áudio
    if (scene.sound.context.state === "suspended") {
        scene.sound.context.resume();
    }

    if (!started) {
        startGame(scene);
    } else {
        jump();
    }
}

function startGame(scene) {
    started = true;
    startText.setVisible(false);

    scene.time.addEvent({
        delay: 1400,
        callback: addPipes,
        callbackScope: scene,
        loop: true
    });
}

function update() {
    if (!started || gameOver) return;

    this.physics.overlap(player, pipes, hitPipe, null, this);

    pipes.children.iterate(pipe => {
        if (pipe && pipe.x < -50) pipe.destroy();
    });
}

function jump() {
    if (gameOver || !canJump) return;

    canJump = false;

    // ZERA velocidade antes (isso resolve o bug do pulo fraco)
    player.setVelocityY(0);
    player.setVelocityY(-420);

    if (jumpSound) jumpSound.play();

    player.setAngle(-20);
    setTimeout(() => {
        player.setAngle(0);
        canJump = true;
    }, 150);
}

function addPipes() {
    if (gameOver) return;

    let gap = Phaser.Math.Clamp(180 - score * 2, 120, 180);
    let topHeight = Phaser.Math.Between(80, 400);

    let pipeTop = pipes.create(400, topHeight - gap, "pipe");
    pipeTop.setOrigin(0,1);
    pipeTop.body.allowGravity = false;
    pipeTop.setVelocityX(speed);

    let pipeBottom = pipes.create(400, topHeight + gap, "pipe");
    pipeBottom.setOrigin(0,0);
    pipeBottom.body.allowGravity = false;
    pipeBottom.setVelocityX(speed);

    let scoreZone = this.add.rectangle(400, 300, 10, 600);
    this.physics.add.existing(scoreZone);
    scoreZone.body.allowGravity = false;
    scoreZone.body.setVelocityX(speed);

    this.physics.add.overlap(player, scoreZone, () => {
        score++;
        scoreText.setText("Score: " + score);

        if (pointSound) pointSound.play();

        scoreZone.destroy();
        speed -= 2;
    });
}

function hitPipe() {
    gameOver = true;

    if (hitSound) hitSound.play();

    if (score > best) {
        best = score;
        localStorage.setItem("best", best);
    }

    this.add.text(60, 250, "GAME OVER", { fontSize: "28px", fill: "#ff4d4d" });
    this.add.text(40, 300, "Clique para reiniciar", { fontSize: "18px", fill: "#fff" });

    this.input.once("pointerdown", () => restartGame.call(this));
}

function restartGame() {
    score = 0;
    speed = -200;
    gameOver = false;
    started = false;

    pipes.clear(true, true);
    player.setPosition(100, 300);
    player.setVelocity(0);

    scoreText.setText("Score: 0");
    bestText.setText("Recorde: " + best);
    startText.setVisible(true);
}
</script>

</body>
</html>
